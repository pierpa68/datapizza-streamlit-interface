# DeepAiUG Branding Configuration
# Personalizza l'interfaccia per la tua organizzazione

app:
  title: "DeepAiUG Chat"    # Es. "AziendaXYZ AI"
  icon: "🧠"                # Es. "🏢" oppure "⚙️"
  subtitle: ""               # Opzionale, lascia vuoto per nasconderlo

news_banner:
  enabled: true
  # text e version ora derivano automaticamente da config/constants.py
  # Decommentare per sovrascrivere manualmente:
  # text: "Testo personalizzato"
  # version: "1.12.0"

# v1.12.2 - Theme Selection
theme: "business_modern"   # Opzioni: "business_modern" (default), "matrix"
# Se usi "matrix", puoi configurare anche:
# matrix_rain: true          # true/false — attiva/disattiva pioggia Matrix
# matrix_rain_intensity: 0.055  # float 0.01-0.20 — opacità pioggia
